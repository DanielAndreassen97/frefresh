version: 2
builds:
  - main: .
    binary: frefresh
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "frefresh_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - repository:
      owner: DanielAndreassen97
      name: homebrew-tap
    homepage: https://github.com/DanielAndreassen97/frefresh
    description: Interactive CLI for refreshing tables in Fabric semantic models

scoops:
  - repository:
      owner: DanielAndreassen97
      name: scoop-bucket
    homepage: https://github.com/DanielAndreassen97/frefresh
    description: Interactive CLI for refreshing tables in Fabric semantic models

checksum:
  name_template: "checksums.txt"
